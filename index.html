<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/mascot.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f97316" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Kone Kids" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kone Kids Academy - Coding, Robotics, and AI programs for the next generation of tech leaders. Do it Right." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kids.koneacademy.io/" />
    <meta property="og:title" content="Kone Kids | Coding, Robotics & AI" />
    <meta property="og:description" content="Fun, hands-on engineering programs for children. Start their tech journey today." />
    <meta property="og:image" content="https://kids.koneacademy.io/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://kids.koneacademy.io/" />
    <meta name="twitter:title" content="Kone Kids | Coding, Robotics & AI" />
    <meta name="twitter:description" content="Fun, hands-on engineering programs for children. Start their tech journey today." />
    <meta name="twitter:image" content="https://kids.koneacademy.io/og-image.png" />

    <title>Kone Kids | Coding, Robotics & AI</title>
    
    <!-- Structured Data (Invisible SEO) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Kone Kids",
        "url": "https://kids.koneacademy.io/",
        "parentOrganization": {
          "@type": "Organization",
          "name": "Kone Academy",
          "url": "https://koneacademy.io/"
        }
      }
    </script>
  </head>
  <body>
    <!-- GitHub Pages SPA redirect handler -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <!-- PWA Splash Screen -->
    <div id="splash-screen" style="
      position: fixed;
      inset: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
    ">
      <div style="
        animation: splashPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      ">
        <img src="/mascot.svg" alt="Kone Kids" style="width: 140px; height: 140px;" />
        <div style="text-align: center;">
          <div style="
            font-family: 'Baloo 2', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            font-style: italic;
            color: #0f172a;
            letter-spacing: -0.5px;
          ">Kone <span style="color: #f97316;">Kids</span></div>
          <div style="
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            color: #64748b;
            margin-top: 0.25rem;
          ">Coding · Robotics · AI</div>
        </div>
        <!-- Loading dots -->
        <div style="display: flex; gap: 8px; margin-top: 0.5rem;">
          <span style="width:10px;height:10px;border-radius:50%;background:#f97316;animation:dotPulse 1.2s ease-in-out infinite 0s;display:block;"></span>
          <span style="width:10px;height:10px;border-radius:50%;background:#0ea5e9;animation:dotPulse 1.2s ease-in-out infinite 0.2s;display:block;"></span>
          <span style="width:10px;height:10px;border-radius:50%;background:#a855f7;animation:dotPulse 1.2s ease-in-out infinite 0.4s;display:block;"></span>
        </div>
      </div>
    </div>

    <style>
      @keyframes splashPop {
        from { transform: scale(0.7); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
      }
      @keyframes dotPulse {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40%           { transform: scale(1.2); opacity: 1; }
      }
    </style>

    <script>
      // Dismiss splash once the page is fully interactive
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash-screen');
          if (splash) {
            splash.style.opacity = '0';
            splash.style.visibility = 'hidden';
            setTimeout(function() { splash.remove(); }, 500);
          }
        }, 1200);
      });
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[Kone Kids] SW registered:', reg.scope))
            .catch(err => console.warn('[Kone Kids] SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
